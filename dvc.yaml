stages:

  # ----------------------------
  # SHARED PREPROCESSING
  # ----------------------------
  preprocess:
    cmd: python scripts/preprocess_data.py
    outs:
      - data/sft_data.jsonl
      - data/dpo_data.jsonl

  # ----------------------------
  # FULL PIPELINE (SFT → DPO)
  # ----------------------------
  train_sft:
    cmd: python scripts/train_sft.py
    deps:
      - data/sft_data.jsonl
      - configs/training/sft.yaml
      - configs/model/qwen2_5_7b.yaml
    outs:
      - models/sft/:
          persist: true

  evaluate_sft:
    cmd: python scripts/evaluate.py model_name=sft
    deps:
      - models/sft/
    metrics:
      - results/sft_metrics.json:
          cache: false

  train_dpo:
    cmd: python scripts/train_dpo.py model.name=models/sft/final
    deps:
      - models/sft/
      - data/dpo_data.jsonl
      - configs/training/dpo.yaml
    outs:
      - models/dpo/:
          persist: true

  evaluate_dpo:
    cmd: python scripts/evaluate.py model_name=dpo
    deps:
      - models/dpo/
    metrics:
      - results/dpo_metrics.json:
          cache: false

  # ----------------------------
  # ABLATION: SFT ONLY
  # ----------------------------
  train_sft_only:
    cmd: python scripts/train_sft.py experiment=ablation
    deps:
      - data/sft_data.jsonl
    outs:
      - models/sft_only/

  # ----------------------------
  # ABLATION: DPO ONLY
  # ----------------------------
  train_dpo_only:
    cmd: python scripts/train_dpo.py model.name=base_model
    deps:
      - data/dpo_data.jsonl
    outs:
      - models/dpo_only/

  evaluate_dpo_only:
    cmd: python scripts/evaluate.py model_name=dpo_only
    deps:
      - models/dpo_only/
    metrics:
      - results/dpo_only_metrics.json:
          cache: false

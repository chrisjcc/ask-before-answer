stages:
  preprocess:
    cmd: python scripts/preprocess_data.py
    deps:
      - src/data/preprocess.py
      - configs/data/ambignq.yaml
    outs:
      - data/sft_data.jsonl
      - data/dpo_data.jsonl

  train_sft:
    cmd: python scripts/train_sft.py
    deps:
      - data/sft_data.jsonl
      - src/training/trainer.py
      - configs/training/sft.yaml
      - configs/model/qwen2_5_7b.yaml
    outs:
      - models/sft_output/final

  evaluate_sft:
    cmd: python scripts/evaluate.py model_name=sft
    deps:
      - models/sft_output/final
      - src/evaluation/judge.py
      - configs/config.yaml
    metrics:
      - results/sft_metrics.json:
          cache: false

  train_dpo:
    cmd: python scripts/train_dpo.py model.name=models/sft_output/final
    deps:
      - models/sft_output/final
      - data/dpo_data.jsonl
      - src/training/trainer.py
      - configs/training/dpo.yaml
    outs:
      - models/dpo_output/final

  evaluate_sft_dpo:
    cmd: python scripts/evaluate.py model_name=sft_dpo
    deps:
      - models/dpo_output/final
      - src/evaluation/judge.py
      - configs/config.yaml
    metrics:
      - results/sft_dpo_metrics.json:
          cache: false

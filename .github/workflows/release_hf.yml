name: Publish to Hugging Face on Release

on:
  release:
    types: [published]

jobs:
  publish-to-hf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dvc[gdrive] huggingface_hub

      - name: Authenticate DVC with Google Drive
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
        run: |
          dvc remote modify --local origin gdrive_client_id $GDRIVE_CLIENT_ID
          dvc remote modify --local origin gdrive_client_secret $GDRIVE_CLIENT_SECRET
          dvc remote modify --local origin gdrive_credentials_data $GDRIVE_CREDENTIALS_DATA

      - name: Pull data via DVC
        run: dvc pull

      - name: Publish to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: python scripts/publish_to_hf.py

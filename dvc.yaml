stages:

  # ----------------------------
  # SHARED PREPROCESSING
  # ----------------------------
  preprocess:
    cmd: python scripts/preprocess_data.py
    deps:
      - scripts/preprocess_data.py
      - src/data/preprocess.py
      - configs/data/ambignq.yaml
    outs:
      - data/sft_train.jsonl
      - data/sft_val.jsonl
      - data/dpo_train.jsonl
      - data/dpo_val.jsonl

  # ----------------------------
  # FULL PIPELINE (SFT → DPO)
  # ----------------------------
  train_sft:
    cmd: CUDA_VISIBLE_DEVICES=0 python scripts/train_sft.py
    deps:
      - data/sft_train.jsonl
      - data/sft_val.jsonl
      - configs/training/sft.yaml
      - configs/model/qwen2_5_7b.yaml
    outs:
      - models/sft/final:
          persist: false

  evaluate_sft:
    cmd: python scripts/evaluate.py model_name=sft
    deps:
      - models/sft/final
    metrics:
      - results/sft_metrics.json:
          cache: false

  train_dpo:
    cmd: CUDA_VISIBLE_DEVICES=0 python scripts/train_dpo.py training=dpo model.name=models/sft/final
    deps:
      - models/sft/final
      - data/dpo_train.jsonl
      - data/dpo_val.jsonl
      - configs/training/dpo.yaml
    outs:
      - models/dpo/final:
          persist: false

  evaluate_dpo:
    cmd: python scripts/evaluate.py model_name=dpo
    deps:
      - models/dpo/final
    metrics:
      - results/dpo_metrics.json:
          cache: false

  # ----------------------------
  # ABLATION: SFT ONLY
  # ----------------------------
  train_sft_only:
    cmd: CUDA_VISIBLE_DEVICES=0 python scripts/train_sft.py training.output_dir=models/sft_only
    deps:
      - data/sft_train.jsonl
      - data/sft_val.jsonl
      - configs/training/sft.yaml
      - configs/model/qwen2_5_7b.yaml
    outs:
      - models/sft_only/final

  evaluate_sft_only:
    cmd: python scripts/evaluate.py model_name=sft_only
    deps:
      - models/sft_only/final
    metrics:
      - results/sft_only_metrics.json:
          cache: false

  # ----------------------------
  # ABLATION: DPO ONLY
  # ----------------------------
  train_dpo_only:
    cmd: CUDA_VISIBLE_DEVICES=0 python scripts/train_dpo.py training=dpo training.output_dir=models/dpo_only
    deps:
      - data/dpo_train.jsonl
      - data/dpo_val.jsonl
      - configs/training/dpo.yaml
      - configs/model/qwen2_5_7b.yaml
    outs:
      - models/dpo_only/final

  evaluate_dpo_only:
    cmd: python scripts/evaluate.py model_name=dpo_only
    deps:
      - models/dpo_only/final
    metrics:
      - results/dpo_only_metrics.json:
          cache: false

  # ----------------------------
  # ABLATION: ORPO ONLY
  # ----------------------------
  train_orpo:
    cmd: CUDA_VISIBLE_DEVICES=0 python scripts/train_orpo.py training=orpo
    deps:
      - data/dpo_train.jsonl
      - data/dpo_val.jsonl
      - configs/training/orpo.yaml
      - configs/model/qwen2_5_7b.yaml
    outs:
      - models/orpo/final

  evaluate_orpo:
    cmd: python scripts/evaluate.py model_name=orpo
    deps:
      - models/orpo/final
    metrics:
      - results/orpo_metrics.json:
          cache: false

  # ----------------------------
  # ABLATION: GRPO ONLY
  # ----------------------------
  train_grpo:
    cmd: CUDA_VISIBLE_DEVICES=0 python scripts/train_grpo.py training=grpo
    deps:
      - data/dpo_train.jsonl
      - data/dpo_val.jsonl
      - configs/training/grpo.yaml
      - configs/model/qwen2_5_7b.yaml
    outs:
      - models/grpo/final:
          persist: false

  evaluate_grpo:
    cmd: python scripts/evaluate.py model_name=grpo
    deps:
      - models/grpo/final
    metrics:
      - results/grpo_metrics.json:
          cache: false

  # ----------------------------
  # ABLATION: GRPO -> DPO
  # ----------------------------
  train_grpo_dpo:
    cmd: CUDA_VISIBLE_DEVICES=0 python scripts/train_dpo.py training=dpo model.name=models/grpo/final training.output_dir=models/grpo_dpo
    deps:
      - models/grpo/final
      - data/dpo_train.jsonl
      - data/dpo_val.jsonl
      - configs/training/dpo.yaml
    outs:
      - models/grpo_dpo/final:
          persist: false

  evaluate_grpo_dpo:
    cmd: python scripts/evaluate.py model_name=grpo_dpo
    deps:
      - models/grpo_dpo/final
    metrics:
      - results/grpo_dpo_metrics.json:
          cache: false


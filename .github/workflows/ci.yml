name: AskBeforeAnswer CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black ruff pytest
        pip install -e .
        
    - name: Lint with ruff
      run: |
        ruff check src scripts tests app
        
    - name: Format check with black
      run: |
        black --check src scripts tests app
        
    - name: Run tests
      run: |
        pytest tests/

  deploy-to-hf:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Hugging Face Spaces
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        # Setup Git
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        
        # Clone the HF Space repository
        git clone https://chrisjcc:${HF_TOKEN}@huggingface.co/spaces/chrisjcc/ask-before-answer-demo hf_space
        cd hf_space
        
        # Clean existing files (except .git) to allow for deletions
        find . -maxdepth 1 ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +
        
        # Copy essential runtime files from the GitHub repo
        cp ../Dockerfile .
        cp ../requirements.txt .
        cp ../pyproject.toml .
        cp -r ../app .
        cp -r ../src .
        
        # Copy the specific Hugging Face README as the root README.md
        cp ../.github/hf_space_readme.md README.md
        
        # Commit and Push
        git add .
        git commit -m "Automated deployment from GitHub Actions: ${GITHUB_SHA}" || echo "No changes to commit"
        git push origin main


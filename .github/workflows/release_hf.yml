name: Publish to Hugging Face on Release

on:
  release:
    types: [published]

jobs:
  publish-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dvc huggingface_hub
          
      - name: Authenticate DVC with Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Get the default remote name from the committed .dvc/config
          REMOTE_NAME=$(dvc remote default)
          if [ -n "$REMOTE_NAME" ]; then
            # Configure basic HTTP/WebDAV auth for the DVC remote using the HF Token
            dvc remote modify --local $REMOTE_NAME user chrisjcc
            dvc remote modify --local $REMOTE_NAME password $HF_TOKEN
          else
            echo "No default DVC remote found! Please ensure you have added a DVC remote and committed .dvc/config"
            exit 1
          fi
          
      - name: Pull data via DVC
        run: dvc pull
        
      - name: Publish to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          python scripts/publish_to_hf.py

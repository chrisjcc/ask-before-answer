project: ask-before-answer
program: scripts/run_sweep_trial.py
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - "--stage"
  - "train_dpo"
  - ${args}
method: bayes
metric:
  name: eval/rewards/accuracies
  goal: maximize

# Enable Hyperband Early Stopping
early_terminate:
  type: hyperband
  min_iter: 5    # The first check happens after logging val_loss 5 times (e.g., epoch 5)
  eta: 3         # Brackets scale by 3. Checks happen at 5, 15, 45 iterations.
                 # At each check, only the top 1/3 of runs survive.

parameters:
  beta:
    distribution: uniform
    min: 0.01
    max: 0.5
